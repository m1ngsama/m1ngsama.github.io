<!doctype html>
<html lang="en" class="no-js">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#020204" />
    <meta name="color-scheme" content="dark" />
    <meta
      name="description"
      content="A generative WebGL experiment by independent developer m1ngsama."
    />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="m1ngsama — WebGL Experiment" />
    <meta
      property="og:description"
      content="An evolving study in form, light, and interaction."
    />
    <meta property="og:url" content="https://m1ngsama.github.io/" />
    <meta property="og:site_name" content="m1ngsama" />
    <meta name="twitter:card" content="summary" />
    <link rel="canonical" href="https://m1ngsama.github.io/" />
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="manifest" href="/site.webmanifest" />
    <title>m1ngsama — WebGL Experiment</title>
    <script>
      document.documentElement.classList.replace('no-js', 'js');
    </script>
  </head>
  <body>
    <a class="skip-link" href="#phase-1">Enter the experiment</a>

    <div class="experience" aria-hidden="true">
      <div class="fallback-art">
        <i class="fallback-art__a"></i>
        <i class="fallback-art__b"></i>
        <i class="fallback-art__core"></i>
      </div>
      <canvas class="experience__canvas" id="webgl"></canvas>
      <div class="experience__vignette"></div>
      <div class="experience__grain"></div>
    </div>

    <header class="chrome" aria-label="Site controls">
      <a class="wordmark" href="#phase-1" aria-label="m1ngsama, return to the beginning">
        m1ng<span aria-hidden="true">.</span>
      </a>
      <button class="motion-toggle" id="motion-toggle" type="button" aria-label="Pause animation" aria-pressed="false" disabled>
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path class="motion-toggle__pause" d="M9 7v10M15 7v10" />
          <path class="motion-toggle__play" d="m9 7 8 5-8 5Z" />
        </svg>
      </button>
      <a
        class="external-link"
        href="https://github.com/m1ngsama"
        target="_blank"
        rel="noreferrer"
        aria-label="Visit m1ngsama on GitHub"
      >
        <svg viewBox="0 0 24 24" aria-hidden="true">
          <path d="M7 17 17 7M8 7h9v9" />
        </svg>
      </a>
    </header>

    <main id="main" aria-label="The Fold, a generative WebGL experiment">
      <h1 class="sr-only">The Fold — a generative WebGL experiment by m1ngsama</h1>
      <p class="sr-only">
        Scroll through five phases as a metallic surface folds into a continuous ring. The animation is decorative;
        the GitHub link remains available above.
      </p>
      <section class="phase" id="phase-1" aria-label="Phase one: surface"></section>
      <section class="phase" id="phase-2" aria-label="Phase two: fold"></section>
      <section class="phase" id="phase-3" aria-label="Phase three: signal"></section>
      <section class="phase" id="phase-4" aria-label="Phase four: orbit"></section>
      <section class="phase" id="phase-5" aria-label="Phase five: horizon"></section>
    </main>

    <nav class="phase-nav" aria-label="Experiment phases">
      <a href="#phase-1" aria-label="Go to phase 1"><span></span></a>
      <a href="#phase-2" aria-label="Go to phase 2"><span></span></a>
      <a href="#phase-3" aria-label="Go to phase 3"><span></span></a>
      <a href="#phase-4" aria-label="Go to phase 4"><span></span></a>
      <a href="#phase-5" aria-label="Go to phase 5"><span></span></a>
    </nav>

    <div class="hud" aria-hidden="true">
      <span class="hud__index" id="phase-index">01</span>
      <span class="hud__rule"><i id="scroll-progress"></i></span>
      <span class="hud__total">05</span>
    </div>

    <div class="scroll-cue" aria-hidden="true">
      <span></span>
    </div>

    <div class="pointer" aria-hidden="true"><i></i></div>

    <noscript>
      <p class="noscript">This visual experiment requires JavaScript.</p>
    </noscript>

    <script type="module" src="/main.ts"></script>
  </body>
</html>
